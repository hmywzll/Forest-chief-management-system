
server:
  port: 8080
spring:
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/forest_chief_management_system?useSSL=false&serverTimezone=GMT%2B8
      username: root
      password: 1346792580
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名(since 3.3.0,配置后可以忽略不配置步骤2)
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)
      id-type: assign_id

logging:
  level:
    root: info
    com.forestchiefmanagementsystem: debug
  file:
    path: ${project_url}ForestChiefManagementSystem/src/main/resources/log/

forest_chief_management_system:
  img_url: ${project_url}ForestChiefManagementSystem/src/main/resources/static/img/

